<div class="form-container">

<h2>College Tech Fest Registration</h2>

<form>

<input type="text" placeholder="Full Name" required>

<input type="email" placeholder="Email Address" required>

<input type="tel" placeholder="Phone Number" required>

<select required>
<option value="">Select Department</option>
<option>Information Technology</option>
<option>Computer Science Engineering</option>
<option>Electronics and Communication Engineering</option>
<option>Electrical and Electronics Engineering</option>
<option>Mechanical Engineering</option>
<option>Civil Engineering</option>
<option>Artificial Intelligence & Data Science</option>
<option>Cyber Security</option>
</select>

<select required>
<option value="">Select Event</option>
<option>Coding Contest</option>
<option>Paper Presentation</option>
<option>Debugging Challenge</option>
<option>Hackathon</option>
<option>Web Design Competition</option>
<option>Mobile App Development</option>
<option>AI Innovation Challenge</option>
<option>Technical Quiz</option>
<option>Project Expo</option>
<option>Poster Presentation</option>
</select>

<button type="submit">Register Now</button>

</form>
